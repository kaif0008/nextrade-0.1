<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Nextrade</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4361ee;
    --primary-dark: #3a56d4;
    --light: #f8f9fa;
    --dark: #212529;
    --gray: #6c757d;
    --border: #dee2e6;
    --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--light);
}

.signup-card {
    background:white;
    padding:2.5rem;
    border-radius:16px;
    width:100%;
    max-width:450px;
    box-shadow:var(--card-shadow);
}

h2 {
    text-align:center;
    margin-bottom:10px;
}

.subtext {
    text-align:center;
    color:var(--gray);
    margin-bottom:20px;
}

form { display:flex; flex-direction:column; gap:15px; }

.input-group {
    position:relative;
}

.input-group i {
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--gray);
}

input, select {
    width:100%;
    padding:12px 12px 12px 35px;
    border:1px solid var(--border);
    border-radius:8px;
}

button {
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover {
    background:var(--primary-dark);
}

.status-message {
    position:fixed;
    top:20px;
    right:20px;
    padding:10px 20px;
    border-radius:8px;
    display:none;
}
</style>
</head>

<body>

<div class="signup-card">
    <h2>Create Account</h2>
    <p class="subtext">Join NexTrade</p>

    <form id="signupForm">

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <div class="input-group">
            <i class="fas fa-user-tag"></i>
            <select id="role" required>
                <option value="">Select Role</option>
                <option value="wholesaler">Wholesaler</option>
                <option value="retailer">Retailer</option>
            </select>
        </div>

        <!-- GST FIELD -->
        <div class="input-group" id="gst-field" style="display:none;">
            <i class="fas fa-id-card"></i>
            <input type="text" id="gstNumber" placeholder="GST Number">
        </div>

        <button type="submit">Sign Up</button>

        <p style="text-align:center;">Already have account? <a href="login.html">Login</a></p>
    </form>
</div>

<div class="status-message" id="statusMessage"></div>

<script>
// SHOW GST FIELD
document.getElementById("role").addEventListener("change", function() {
    const gstField = document.getElementById("gst-field");

    if (this.value === "wholesaler" || this.value === "retailer") {
        gstField.style.display = "block";
    } else {
        gstField.style.display = "none";
    }
});

// FORM SUBMIT
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
    const gstNumber = document.getElementById("gstNumber").value;

    // VALIDATION
    if (!name || !email || !password || !role) {
        return showMsg("Fill all fields", false);
    }

    if (role === "wholesaler" && !gstNumber) {
        return showMsg("GST required for wholesaler", false);
    }

    try {
        const res = await fetch("/api/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name, email, password, role, gstNumber
            })
        });

        const data = await res.json();

        if (data.success) {
            showMsg("Signup successful", true);
            setTimeout(()=> window.location.href="login.html", 1500);
        } else {
            showMsg(data.message, false);
        }

    } catch {
        showMsg("Error occurred", false);
    }
});

// MESSAGE
function showMsg(msg, success) {
    const box = document.getElementById("statusMessage");
    box.style.display = "block";
    box.style.background = success ? "#d4edda" : "#f8d7da";
    box.innerText = msg;

    setTimeout(()=> box.style.display="none", 3000);
}
</script>

</body>
</html>
