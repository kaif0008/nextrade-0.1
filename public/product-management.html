<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTrade | Product Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --card-bg: #ffffff;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-md: 0 5px 15px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
            --border-radius: 12px;
            --danger: #ef233c;
            --success: #2bc155;
            --warning: #fca311;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar --- (Exact from Wholesaler Dashboard) */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .logo i {
            color: var(--primary-light);
        }

        .toggle-btn {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
        }

        .nav-link i {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .nav-link:hover {
            background: rgba(67, 97, 238, 0.05);
            color: var(--primary);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .nav-link.active i {
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            color: var(--danger);
        }
        .logout-btn:hover {
            background: rgba(239, 35, 60, 0.05);
            color: var(--danger);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
            transition: var(--transition);
        }

        /* Topbar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .welcome-text h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
        }

        .user-profile-top {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }

        .user-info-top {
            display: flex;
            flex-direction: column;
        }

        .user-name-top {
            font-weight: 600;
            font-size: 14px;
        }
        .user-role-top {
            font-size: 12px;
            color: var(--primary);
        }

        /* Inventory specific styles */
        .controls-layer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }

        .search-area {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        .search-area input, .search-area select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .search-area input {
            flex: 1;
        }

        .search-area input:focus, .search-area select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #3f37c9;
            transform: translateY(-2px);
        }

        /* Product Cards */
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
            position: relative;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .badge-success { background: var(--success); }
        .badge-warning { background: var(--warning); }
        .badge-danger { background: var(--danger); }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .stock-section {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .stock-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stock-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stock-btn {
            width: 28px;
            height: 28px;
            border-radius: 5px;
            border: 1px solid #e2e8f0;
            background: white;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .stock-btn:hover {
            background: #e2e8f0;
        }

        .stock-btn.add { color: var(--success); }
        .stock-btn.reduce { color: var(--danger); }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .card-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-edit { background: #e0e7ff; color: var(--primary); }
        .btn-edit:hover { background: #c7d2fe; }

        .btn-delete { background: #ffe4e6; color: var(--danger); }
        .btn-delete:hover { background: #fecdd3; }

        /* Slide-over Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .slide-modal {
            position: fixed;
            top: 0; right: -400px;
            width: 400px;
            height: 100vh;
            background: white;
            z-index: 1000;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .slide-modal.active {
            right: 0;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 18px; }

        .close-modal {
            background: none; border: none; font-size: 20px;
            cursor: pointer; color: var(--text-muted);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block; margin-bottom: 5px; font-size: 13px; font-weight: 500; color: var(--text-main);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #e2e8f0;
            border-radius: 6px; font-size: 14px; outline: none;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        .modal-footer .btn { flex: 1; justify-content: center; }
        .btn-cancel { background: #f1f5f9; color: var(--text-main); }
        .btn-cancel:hover { background: #e2e8f0; transform: translateY(0); }

        /* Responsive */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .toggle-btn { display: block; }
            .sidebar-overlay.active { display: block; }
            .slide-modal { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="wholesaler-dashboard.html" class="logo">
                <i class="fas fa-chart-line"></i> NexTrade
            </a>
            <button class="toggle-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>

        <nav class="nav-links">
            <button class="nav-link" onclick="go('dashboard')">
                <i class="fas fa-home"></i> Dashboard
            </button>
            <button class="nav-link active" onclick="go('products')">
                <i class="fas fa-box"></i> My Products
            </button>
            <button class="nav-link" onclick="go('deals')">
                <i class="fas fa-handshake"></i> Deals Record
            </button>
            <button class="nav-link" onclick="go('messages')">
                <i class="fas fa-comment-dots"></i> Messages
            </button>
            <button class="nav-link" onclick="go('requirements')">
                <i class="fas fa-list-check"></i> Requirements
            </button>
            <button class="nav-link" onclick="go('profile')">
                <i class="fas fa-user"></i> Profile
            </button>
            
            <button class="nav-link logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <div class="welcome-text" style="display: flex; align-items: center; gap: 15px;">
                <button class="toggle-btn" id="openSidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Inventory Management</h1>
            </div>

            <div class="user-profile-top" onclick="go('profile')">
                <div class="user-info-top" style="text-align: right;">
                    <span class="user-name-top" id="topName">User</span>
                    <span class="user-role-top">Wholesaler</span>
                </div>
                <div class="avatar" id="topAvatar">U</div>
            </div>
        </header>

        <div class="controls-layer">
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Search products by name...">
                <select id="filterSelect">
                    <option value="all">All Products</option>
                    <option value="low">Low Stock (≤ 10)</option>
                    <option value="critical">Critical Stock (0)</option>
                </select>
                <select id="categorySelect">
                    <option value="">All Categories</option>
                </select>
            </div>
            <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Add Product</button>
        </div>

        <div class="product-list" id="productList">
            <!-- Products rendered here -->
        </div>

    </main>

    <!-- Slide-over Modal -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="slide-modal" id="productModal">
        <div class="modal-header">
            <h2 id="modalTitle">Add Product</h2>
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="name" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;">
                        <label>Price</label>
                        <input type="number" id="price" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Unit</label>
                        <select id="unit" onchange="onUnitSelectChange()">
                            <option value="piece">Piece</option>
                            <option value="kg">Kg</option>
                            <option value="gram">Gram</option>
                            <option value="liter">Liter</option>
                            <option value="box">Box</option>
                            <option value="dozen">Dozen</option>
                            <option value="Other">Other (Custom)</option>
                        </select>
                        <input type="text" id="custom_unit" placeholder="Enter custom unit" style="display:none; margin-top:8px;">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;">
                        <label>Stock</label>
                        <input type="number" id="stock" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>MOQ</label>
                        <input type="number" id="moq" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Category (Fixed to your Business Category)</label>
                    <input type="text" id="category" readonly style="background-color: #f1f5f9; cursor: not-allowed;" required>
                </div>
                    <label>Image</label>
                    <input type="file" id="imageFile" accept="image/*" onchange="previewImage(event)">
                    <div id="imagePreviewContainer" style="margin-top:10px; display:none; position:relative; width:max-content;">
                        <img id="imagePreview" src="" style="max-height: 100px; border-radius: 6px; border: 1px solid #e2e8f0; display: block;">
                        <button type="button" onclick="clearImage()" style="position:absolute; top:-8px; right:-8px; background:var(--danger); color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:10px;"><i class="fas fa-times"></i></button>
                    </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="saveProduct()">Save Product</button>
        </div>
    </div>

    <script>
        // Check Auth
        const user = JSON.parse(localStorage.getItem("user"));
        const token = localStorage.getItem("token");

        if(!user || !token) location.href = "login.html";
        if(user.role !== "wholesaler") location.href = "dashboard.html";

        // Navigation
        function go(p){
            if(p === "dashboard") location.href = "wholesaler-dashboard.html";
            if(p === "products") location.href = "product-management.html";
            if(p === "deals") location.href = "deals-record.html";
            if(p === "messages") location.href = "messages.html";
            if(p === "profile") location.href = "profile.html";
            if(p === "requirements") location.href = "requirements.html";
        }

        function logout(){
            localStorage.clear();
            location.href = "login.html";
        }

        // Sidebar
        const sidebar = document.getElementById("sidebar");
        const openBtn = document.getElementById("openSidebar");
        const closeBtn = document.getElementById("closeSidebar");
        const overlay = document.getElementById("sidebarOverlay");

        function toggleSidebar() {
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
        }
        if(openBtn) openBtn.addEventListener("click", toggleSidebar);
        if(closeBtn) closeBtn.addEventListener("click", toggleSidebar);
        if(overlay) overlay.addEventListener("click", toggleSidebar);
        
        // Setup User Info
        document.getElementById("topName").innerText = user.name;
        document.getElementById("topAvatar").innerText = user.name.charAt(0).toUpperCase();

        // ----------------- SYSTEM LOGIC -----------------
        let allProducts = [];
        let editingId = null;
        let selectedImageFile = null;

        // Handle Image Upload
        function previewImage(event) {
            const file = event.target.files[0];
             if(!file) return;
             
             selectedImageFile = file;
             const reader = new FileReader();
             reader.onload = function(e) {
                 document.getElementById("imagePreview").src = e.target.result;
                 document.getElementById("imagePreviewContainer").style.display = "block";
             };
             reader.readAsDataURL(file);
        }

        function clearImage() {
            document.getElementById("imageFile").value = "";
            selectedImageFile = null;
            document.getElementById("imagePreviewContainer").style.display = "none";
        }


        async function loadProducts() {
            try {
                const res = await fetch('/api/products/my', {
                    headers: { "Authorization": "Bearer " + token }
                });
                const data = await res.json();
                if(data.success) {
                    allProducts = data.products;
                    updateCategoryDropdown();
                    renderProducts();
                }
            } catch(e) { console.error(e); }
        }

        function updateCategoryDropdown() {
            const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
            const select = document.getElementById("categorySelect");
            select.innerHTML = `<option value="">All Categories</option>` + 
                categories.map(c => `<option value="${c}">${c}</option>`).join("");
        }

        function renderProducts() {
            const list = document.getElementById("productList");
            const search = document.getElementById("searchInput").value.toLowerCase();
            const filterBy = document.getElementById("filterSelect").value;
            const cat = document.getElementById("categorySelect").value;

            let filtered = allProducts.filter(p => p.name.toLowerCase().includes(search));
            
            if(cat) filtered = filtered.filter(p => p.category === cat);

            if(filterBy === "low") filtered = filtered.filter(p => p.stock > 0 && p.stock <= 10);
            if(filterBy === "critical") filtered = filtered.filter(p => p.stock === 0);

            if(filtered.length === 0) {
                list.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 40px; color:#8d99ae;">No products found</div>`;
                return;
            }

            list.innerHTML = filtered.map(p => {
                let badge = "";
                if(p.stock === 0) badge = `<div class="badge badge-danger">Out of Stock</div>`;
                else if(p.stock <= 10) badge = `<div class="badge badge-warning">Low Stock</div>`;
                else badge = `<div class="badge badge-success">In Stock</div>`;

                const reserved = p.reservedStock || 0;
                const available = p.stock - reserved;

                return `
                <div class="card">
                    ${badge}
                    <img src="${p.image || 'https://images.unsplash.com/photo-1572017351651-7ecdeca91834?auto=format&fit=crop&q=80&w=400'}">
                    <div class="card-body">
                        <div class="card-meta"><i class="fas fa-tag"></i> ${p.category || 'General'}</div>
                        <h3 class="card-title">${p.name}</h3>
                        <div class="price">₹${p.pricePerUnit} <span style="font-size:12px;color:#8d99ae;font-weight:400;">/ ${p.unit}</span></div>
                        
                        <div class="stock-section">
                            <div class="stock-info">
                                <span><i class="fas fa-boxes"></i> Total Stock: <strong>${p.stock}</strong></span>
                                <div>
                                    <span style="color:#fca311;"><i class="fas fa-clock"></i> Reserved: ${reserved}</span>
                                </div>
                            </div>
                            <div class="stock-info" style="margin-bottom:0;align-items:center;">
                                <span style="color:${available > 0 ? '#2bc155' : '#ef233c'}"><i class="fas fa-check-circle"></i> Available: ${available}</span>
                                <div class="stock-controls">
                                    <button class="stock-btn reduce" onclick="quickUpdateStock('${p._id}', -1)" title="Reduce Stock"><i class="fas fa-minus"></i></button>
                                    <button class="stock-btn add" onclick="quickUpdateStock('${p._id}', 1)" title="Add Stock"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>

                        <div class="card-actions">
                            <button class="btn-edit" onclick="editProduct('${p._id}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-delete" onclick="deleteProduct('${p._id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Quick Stock Update
        async function quickUpdateStock(id, amount) {
            try {
                const res = await fetch(`/api/products/${id}/stock`, {
                    method: 'PATCH',
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ amount })
                });
                const data = await res.json();
                if(data.success) {
                    const idx = allProducts.findIndex(p => p._id === id);
                    if(idx > -1) allProducts[idx].stock += amount;
                    renderProducts();
                } else alert("Failed to update stock");
            } catch(e) {}
        }

        // Event Listeners for Filters
        document.getElementById("searchInput").addEventListener("input", renderProducts);
        document.getElementById("filterSelect").addEventListener("change", renderProducts);
        document.getElementById("categorySelect").addEventListener("change", renderProducts);

        // Modal Logic
        const modal = document.getElementById("productModal");
        const modalOverlay = document.getElementById("modalOverlay");
        
        function openModal() {
            modal.classList.add("active");
            modalOverlay.classList.add("active");
            
            // Strictly set category from profile
            const wholsalerCat = user.industry || "General";
            document.getElementById("category").value = wholsalerCat;
        }

        function onUnitSelectChange() {
            const select = document.getElementById("unit");
            const custom = document.getElementById("custom_unit");
            if (select.value === 'Other') {
                custom.style.display = 'block';
                custom.focus();
            } else {
                custom.style.display = 'none';
            }
        }

        function closeModal() {
            modal.classList.remove("active");
            modalOverlay.classList.remove("active");
            document.getElementById("productForm").reset();
            document.getElementById("custom_unit").style.display = 'none';
            clearImage();
            editingId = null;
            document.getElementById("modalTitle").innerText = "Add Product";
        }
        
        modalOverlay.addEventListener("click", closeModal);

        async function saveProduct() {
            if (!user.emailVerified) {
                alert('Email verification required to manage products. Please verify your email from your Profile page.');
                return;
            }

            const name = document.getElementById("name").value.trim();
            const price = document.getElementById("price").value;
            const unit = document.getElementById("unit").value === 'Other' ? document.getElementById("custom_unit").value.trim() : document.getElementById("unit").value;
            const stock = document.getElementById("stock").value;
            const moq = document.getElementById("moq").value;
            const category = document.getElementById("category").value;
            const description = document.getElementById("description").value.trim();

            if (!name) return alert("Product Name is required");
            if (!price || price <= 0) return alert("Valid Price is required");
            if (!unit) return alert("Product Unit is required");
            if (!stock || stock < 0) return alert("Initial Stock is required");
            if (!moq || moq < 1) return alert("Minimum Order Quantity (MOQ) must be at least 1");
            if (!category) return alert("Category is required");
            if (!editingId && !selectedImageFile) return alert("Product Image is required.");
            if (!description) return alert("Product Description is required.");

            const formData = new FormData();
            formData.append('name', name);
            formData.append('pricePerUnit', Number(price));
            formData.append('unit', unit);
            formData.append('stock', Number(stock));
            formData.append('moq', Number(moq));
            formData.append('category', category);
            formData.append('description', description);
            
            if (selectedImageFile) {
                formData.append('image', selectedImageFile);
            }

            try {
                const url = editingId ? `/api/products/${editingId}` : '/api/products';
                const method = editingId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: { "Authorization": "Bearer " + token },
                    body: formData
                });
                const data = await res.json();
                
                if(data.success) {
                    closeModal();
                    loadProducts();
                } else alert(data.message || "Error saving product");
            } catch (e) { console.error(e); }
        }

        function editProduct(id) {
            const p = allProducts.find(x => x._id === id);
            if(!p) return;
            
            document.getElementById("name").value = p.name || '';
            document.getElementById("price").value = p.pricePerUnit || '';
            
            const unitSelect = document.getElementById("unit");
            const customUnit = document.getElementById("custom_unit");
            const presetUnits = Array.from(unitSelect.options).map(o => o.value);
            
            if (presetUnits.includes(p.unit)) {
                unitSelect.value = p.unit;
                customUnit.style.display = 'none';
            } else {
                unitSelect.value = 'Other';
                customUnit.value = p.unit || '';
                customUnit.style.display = 'block';
            }

            document.getElementById("stock").value = p.stock || 0;
            document.getElementById("moq").value = p.moq || 1;
            document.getElementById("category").value = user.industry || "General";
            document.getElementById("description").value = p.description || '';
            
            if (p.image) {
                base64ImageString = p.image;
                document.getElementById("imagePreview").src = base64ImageString;
                document.getElementById("imagePreviewContainer").style.display = "block";
            } else {
                clearImage();
            }

            editingId = id;
            document.getElementById("modalTitle").innerText = "Edit Product";
            openModal();
        }

        async function deleteProduct(id) {
            if(!confirm("Are you sure you want to delete this product?")) return;
            try {
                const res = await fetch(`/api/products/${id}`, {
                    method: 'DELETE',
                    headers: { "Authorization": "Bearer " + token }
                });
                if(res.ok) {
                    allProducts = allProducts.filter(p => p._id !== id);
                    updateCategoryDropdown();
                    renderProducts();
                }
            } catch(e) {}
        }

        // Init
        loadProducts();

    </script>
