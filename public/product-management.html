<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6fb;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 15px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px;
    background: #4361ee;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.product-list {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 15px;
}

.card {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2 id="formTitle">Add Product</h2>

<div class="form-grid">
<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price per unit">

<select id="unit">
    <option value="piece">Per Piece</option>
    <option value="kg">Per Kg</option>
    <option value="gram">Per Gram</option>
    <option value="liter">Per Liter</option>
    <option value="ml">Per ML</option>
    <option value="dozen">Per Dozen</option>
    <option value="box">Per Box</option>
    <option value="packet">Per Packet</option>
    <option value="set">Per Set</option>
    <option value="meter">Per Meter</option>
</select>

<input type="number" id="stock" placeholder="Stock">
<input type="number" id="moq" placeholder="MOQ">
<input type="text" id="category" placeholder="Category">
<input type="text" id="image" placeholder="Image URL">
<input type="text" id="description" placeholder="Description">

<button onclick="saveProduct()">Save Product</button>
</div>

<div class="product-list" id="productList"></div>

</div>

<script>
const LOW_STOCK_LIMIT = 10;
let editingId = null;

// 🔐 AUTH CHECK
const token = localStorage.getItem("token");
if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
}

// ================= LOAD PRODUCTS =================
async function loadProducts() {
    try {
        const res = await fetch('/api/products/my', {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!res.ok) throw new Error("Failed to fetch products");

        const data = await res.json();

        const list = document.getElementById("productList");
        list.innerHTML = "";

        if (!data.products || data.products.length === 0) {
            list.innerHTML = "<p>No products found</p>";
            return;
        }

        data.products.forEach(p => {
            const stock = p.stock || 0;

            list.innerHTML += `
            <div class="card" style="border:${stock <= LOW_STOCK_LIMIT ? '2px solid red' : 'none'};">
                <img src="${p.image || 'https://source.unsplash.com/300x200?product'}">

                <h3>${p.name}</h3>

                <p><strong>₹${p.pricePerUnit}</strong> / ${p.unit}</p>

                <p style="color:${stock <= LOW_STOCK_LIMIT ? 'red' : 'black'};">
                    Stock: ${stock}
                    ${stock <= LOW_STOCK_LIMIT ? '⚠️ Low Stock' : ''}
                </p>

                <p>MOQ: ${p.moq || 1}</p>

                <p>${p.description || ""}</p>

                <button onclick="editProduct('${p._id}')">Edit</button>
                <button onclick="deleteProduct('${p._id}')">Delete</button>
            </div>
            `;
        });

    } catch (error) {
        console.error(error);
        document.getElementById("productList").innerHTML = "Error loading products";
    }
}

// ================= SAVE PRODUCT =================
async function saveProduct() {

    const product = {
        name: document.getElementById("name").value,
        pricePerUnit: Number(document.getElementById("price").value),
        unit: document.getElementById("unit").value,
        stock: Number(document.getElementById("stock").value),
        moq: Number(document.getElementById("moq").value),
        category: document.getElementById("category").value,
        image: document.getElementById("image").value,
        description: document.getElementById("description").value
    };

    try {
        let url = '/api/products';
        let method = 'POST';

        if (editingId) {
            url = `/api/products/${editingId}`;
            method = 'PUT';
        }

        const res = await fetch(url, {
            method,
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(product)
        });

        const data = await res.json();

        if (!data.success) {
            alert(data.message || "Error saving product");
            return;
        }

        resetForm();
        loadProducts();

    } catch (error) {
        console.error(error);
        alert("Something went wrong");
    }
}

// ================= EDIT =================
async function editProduct(id) {
    try {
        const res = await fetch('/api/products');
        const data = await res.json();

        const p = data.products.find(x => x._id === id);

        document.getElementById("name").value = p.name;
        document.getElementById("price").value = p.pricePerUnit;
        document.getElementById("unit").value = p.unit;
        document.getElementById("stock").value = p.stock;
        document.getElementById("moq").value = p.moq;
        document.getElementById("category").value = p.category;
        document.getElementById("image").value = p.image;
        document.getElementById("description").value = p.description;

        editingId = id;
        document.getElementById("formTitle").innerText = "✏️ Edit Product";

    } catch (error) {
        console.error(error);
    }
}

// ================= DELETE =================
async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;

    try {
        await fetch(`/api/products/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        loadProducts();

    } catch (error) {
        console.error(error);
    }
}

// ================= RESET =================
function resetForm() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    editingId = null;
    document.getElementById("formTitle").innerText = "Add Product";
}

// ================= INIT =================
loadProducts();
</script>

</body>
</html>
